<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            font-family: 'Arial', sans-serif;
            color: white;
            overflow: hidden;
        }
        #container {
            position: relative;
            width: 400px;
            height: 600px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 15px;
            overflow: hidden;
            background: rgba(0,0,0,0.3);
        }
        canvas {
            display: block;
            background: #0f1620;
        }
        #overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.7);
            pointer-events: none;
            opacity: 1;
            transition: opacity 0.5s;
        }
        #overlay.hidden { opacity: 0; pointer-events: none; }
        h1 { font-size: 48px; margin: 0; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        p { font-size: 20px; margin: 10px 0; }
        button {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 20px;
            background: #00ff9d;
            color: #000;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,255,157,0.4);
            transition: transform 0.2s;
        }
        button:hover { transform: scale(1.05); }
        #score-display {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 2px 5px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="canvas" width="400" height="400"></canvas>
        <div id="score-display">Score: 0</div>
        <div id="overlay">
            <h1>SNAKE</h1>
            <p>Use arrow keys or swipe to move</p>
            <button onclick="startGame()">PLAY</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const scoreDisplay = document.getElementById('score-display');

        const grid = 20;
        let count = 0;
        let score = 0;

        let snake = {
            x: 160,
            y: 160,
            dx: grid,
            dy: 0,
            cells: [],
            maxCells: 4
        };

        let apple = { x: 320, y: 320 };

        function getRandomInt(min, max) {
            return Math.floor(Math.random() * (max - min)) + min;
        }

        function beep(frequency = 300, duration = 100) {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            oscillator.type = 'square';
            oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime);
            oscillator.connect(audioCtx.destination);
            oscillator.start();
            setTimeout(() => oscillator.stop(), duration);
        }

        function loop() {
            requestAnimationFrame(loop);

            if (++count < 6) return; // Controls speed
            count = 0;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Move snake
            snake.x += snake.dx;
            snake.y += snake.dy;

            // Wrap snake
            if (snake.x >= canvas.width) snake.x = 0;
            if (snake.x < 0) snake.x = canvas.width;
            if (snake.y >= canvas.height) snake.y = 0;
            if (snake.y < 0) snake.y = canvas.height;

            // Add new head
            snake.cells.unshift({ x: snake.x, y: snake.y });

            // Remove tail
            if (snake.cells.length > snake.maxCells) snake.cells.pop();

            // Draw apple
            ctx.fillStyle = '#ff355e';
            ctx.beginPath();
            ctx.arc(apple.x + 10, apple.y + 10, 9, 0, Math.PI * 2);
            ctx.fill();

            // Draw snake
            snake.cells.forEach((cell, index) => {
                ctx.fillStyle = index === 0 ? '#50fa7b' : '#8aff9e';
                ctx.fillRect(cell.x, cell.y, grid - 2, grid - 2);

                // Eat apple
                if (cell.x === apple.x && cell.y === apple.y) {
                    snake.maxCells++;
                    score += 10;
                    scoreDisplay.textContent = `Score: ${score}`;
                    beep(600, 120);
                    apple.x = getRandomInt(0, 20) * grid;
                    apple.y = getRandomInt(0, 20) * grid;
                }

                // Collision with self
                for (let i = index + 1; i < snake.cells.length; i++) {
                    if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) {
                        gameOver();
                    }
                }
            });
        }

        function gameOver() {
            beep(150, 400);
            overlay.innerHTML = `
                <h1>GAME OVER</h1>
                <p>Final Score: ${score}</p>
                <button onclick="resetGame()">PLAY AGAIN</button>
            `;
            overlay.classList.remove('hidden');
        }

        function startGame() {
            overlay.classList.add('hidden');
            requestAnimationFrame(loop);
        }

        function resetGame() {
            snake = { x: 160, y: 160, dx: grid, dy: 0, cells: [], maxCells: 4 };
            apple = { x: 320, y: 320 };
            score = 0;
            scoreDisplay.textContent = 'Score: 0';
            overlay.classList.add('hidden');
            requestAnimationFrame(loop);
        }

        // Controls
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft' && snake.dx === 0) { snake.dx = -grid; snake.dy = 0; }
            else if (e.key === 'ArrowUp' && snake.dy === 0) { snake.dx = 0; snake.dy = -grid; }
            else if (e.key === 'ArrowRight' && snake.dx === 0) { snake.dx = grid; snake.dy = 0; }
            else if (e.key === 'ArrowDown' && snake.dy === 0) { snake.dx = 0; snake.dy = grid; }
        });

        // Touch controls
        let touchStartX = 0, touchStartY = 0;
        canvas.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('touchmove', e => {
            if (!touchStartX || !touchStartY) return;
            let touchEndX = e.touches[0].clientX;
            let touchEndY = e.touches[0].clientY;
            let dx = touchEndX - touchStartX;
            let dy = touchEndY - touchStartY;

            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 50 && snake.dx === 0) { snake.dx = grid; snake.dy = 0; }
                else if (dx < -50 && snake.dx === 0) { snake.dx = -grid; snake.dy = 0; }
            } else {
                if (dy > 50 && snake.dy === 0) { snake.dx = 0; snake.dy = grid; }
                else if (dy < -50 && snake.dy === 0) { snake.dx = 0; snake.dy = -grid; }
            }
            touchStartX = 0; touchStartY = 0;
            e.preventDefault();
        }, { passive: false });

        // Initial overlay
        overlay.classList.remove('hidden');
    </script>
</body>
</html>
